name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Generated API client is up to date (contract guardrail)
        run: |
          npm run generate:api
          git diff --exit-code src/api/client/schema.d.ts

      - name: Type check
        run: npm run typecheck

      - name: Tests (Vitest)
        run: npm test

      - name: Build
        env:
          VITE_API_BASE_URL: 'http://localhost:8000'
        run: npm run build

      - name: Dependency audit
        run: npm audit --audit-level=high

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t apichain-client:ci .

  # Shared, reusable cross-repo gates hosted in apichain-backend (05 §6.2
  # guardrail 4). The secret scan runs byte-identical logic in both repos so
  # it cannot drift. Requires the backend WP4 to be merged to main first.
  shared:
    uses: Apichain-Kenya/apichain-backend/.github/workflows/quality-gates.yml@main
